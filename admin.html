<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>무인매장 관리자 대시보드</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Noto Sans KR", sans-serif;
      }
      body {
        background-color: #f4f6f9;
        padding: 20px;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      /* 🚨 침입 경고 배너 스타일 */
      #alert-box {
        display: none;
        background-color: #ff4d4d;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 4px 12px rgba(255, 77, 77, 0.4);
        animation: blink 1s infinite alternate;
      }

      @keyframes blink {
        from {
          opacity: 1;
        }
        to {
          opacity: 0.6;
        }
      }

      .alert-reset-btn {
        margin-top: 10px;
        padding: 8px 16px;
        background-color: white;
        color: #ff4d4d;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
      }
      .alert-reset-btn:hover {
        background-color: #ffe6e6;
      }

      /* 그리드 레이아웃 */
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }
      .card h2 {
        font-size: 18px;
        margin-bottom: 15px;
        color: #444;
        border-bottom: 2px solid #eee;
        padding-bottom: 8px;
      }

      /* 버튼 스타일 */
      .btn-group {
        display: flex;
        gap: 10px;
      }
      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-open {
        background-color: #28a745;
        color: white;
      }
      .btn-close {
        background-color: #dc3545;
        color: white;
      }
      .btn-auto {
        background-color: #007bff;
        color: white;
      }
      .btn:hover {
        opacity: 0.9;
      }

      /* 테이블 스타일 */
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th,
      td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #ddd;
        font-size: 14px;
      }
      th {
        background-color: #f8f9fa;
        color: #555;
      }
      .badge {
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
      }
      .badge-using {
        background-color: #e3f2fd;
        color: #1976d2;
      }
      .badge-done {
        background-color: #e8f5e9;
        color: #388e3c;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🏬 무인매장 관리자 대시보드</h1>

      <!-- 🚨 침입 감지 실시간 경고 배너 -->
      <div id="alert-box">
        🚨 [경고] 무단 침입이 감지되었습니다!
        <br />
        <button class="alert-reset-btn" onclick="resetAlert()">
          경고 해제 (SAFE 전환)
        </button>
      </div>

      <!-- 원격 도어 제어 -->
      <div class="card" style="margin-bottom: 20px">
        <h2>🚪 원격 출입문 제어</h2>
        <div class="btn-group">
          <button class="btn btn-open" onclick="controlDoor('1')">
            강제 열림
          </button>
          <button class="btn btn-close" onclick="controlDoor('0')">
            강제 닫힘
          </button>
          <button class="btn btn-auto" onclick="controlDoor('2')">
            자동 모드 (초기화)
          </button>
        </div>
      </div>

      <div class="grid">
        <!-- 입장/퇴장 이용 기록 -->
        <div class="card">
          <h2>📊 매장 입/퇴장 기록</h2>
          <table>
            <thead>
              <tr>
                <th>OTP</th>
                <th>입장 시간</th>
                <th>퇴장 시간</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="shop-records">
              <tr>
                <td colspan="4">기록을 불러오는 중...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- 관리자 호출 기록 -->
        <div class="card">
          <h2>🔔 관리자 호출 내역</h2>
          <table>
            <thead>
              <tr>
                <th>호출 시간</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="call-records">
              <tr>
                <td colspan="2">기록을 불러오는 중...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const SERVER_URL = "https://wldus.pythonanywhere.com";

      // 1. 도어 제어 명령 전송
      function controlDoor(cmd) {
        fetch(`${SERVER_URL}/api/control`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ con: cmd }),
        })
          .then((res) => res.json())
          .then((data) => {
            alert("명령이 성공적으로 전송되었습니다.");
          })
          .catch((err) => console.error("제어 실패:", err));
      }

      // 2. 침입 경고 상태 주기적 감시 (1초마다 체크)
      function checkAlertStatus() {
        fetch(`${SERVER_URL}/api/status/alert`)
          .then((res) => res.json())
          .then((data) => {
            const alertBox = document.getElementById("alert-box");
            if (data.con === "INTRUSION_DETECTED") {
              alertBox.style.display = "block";
            } else {
              alertBox.style.display = "none";
            }
          })
          .catch((err) => console.error("Alert 상태 조회 실패:", err));
      }

      // 3. 침입 경고 리셋
      function resetAlert() {
        fetch(`${SERVER_URL}/api/alert/reset`, {
          method: "POST",
        })
          .then((res) => res.json())
          .then((data) => {
            alert("경고가 해제되었습니다.");
            document.getElementById("alert-box").style.display = "none";
          })
          .catch((err) => console.error("리셋 실패:", err));
      }

      // 4. 전체 데이터(입출력 기록, 호출 내역) 주기적 동기화
      function loadAllRecords() {
        fetch(`${SERVER_URL}/api/records/all`)
          .then((res) => res.json())
          .then((data) => {
            // 입/퇴장 기록 출력
            const shopTable = document.getElementById("shop-records");
            if (data.shop_records && data.shop_records.length > 0) {
              shopTable.innerHTML = data.shop_records
                .map(
                  (r) => `
                            <tr>
                                <td>${r.otp || "-"}</td>
                                <td>${r.inTime || "-"}</td>
                                <td>${r.outTime || "-"}</td>
                                <td>
                                    <span class="badge ${r.status === "이용중" ? "badge-using" : "badge-done"}">
                                        ${r.status || "완료"}
                                    </span>
                                </td>
                            </tr>
                        `,
                )
                .reverse()
                .join("");
            } else {
              shopTable.innerHTML = `<tr><td colspan="4">입장 기록이 없습니다.</td></tr>`;
            }

            // 호출 기록 출력
            const callTable = document.getElementById("call-records");
            if (data.call_records && data.call_records.length > 0) {
              callTable.innerHTML = data.call_records
                .map(
                  (c) => `
                            <tr>
                                <td>${c.time}</td>
                                <td><span class="badge badge-using">${c.status}</span></td>
                            </tr>
                        `,
                )
                .reverse()
                .join("");
            } else {
              callTable.innerHTML = `<tr><td colspan="2">호출 내역이 없습니다.</td></tr>`;
            }
          })
          .catch((err) => console.error("기록 불러오기 실패:", err));
      }

      // 페이지 로드 시 타이머 가동 (1초 간격 실시간 모니터링)
      window.onload = () => {
        checkAlertStatus();
        loadAllRecords();
        setInterval(checkAlertStatus, 1000);
        setInterval(loadAllRecords, 2000);
      };
    </script>
  </body>
</html>
